var savedSavingPrice = ''; // price yahan store hogi

function buildMobileGF() {
    var $container = jQuery('#gotrgf_form_overview_container_18');
    if (!$container.length) return;

    if ($container.closest('.gf-mobile-main-wrapper').length > 0) return;

    jQuery('.gf-top-wrapper').remove();
    jQuery('.gf-mobile-main-wrapper').remove();

    var $mainWrapper     = jQuery('<div class="gf-mobile-main-wrapper"></div>');
    var $topWrapper      = jQuery(
        '<div class="gf-top-wrapper">' +
            '<div class="main-bespaart-gf">' +
                '<div class="bespaart-gf">Je bespaart <span class="saving-price-moible-gf"></span></div>' +
                '<div class="bespaart-gf-small">aan opstartkosten</div>' +
            '</div>' +
            '<div class="downarrow-gf"></div>' +
        '</div>'
    );
    var $overviewWrapper = jQuery('<div class="gf-overview-wrapper"></div>');

    $container.before($mainWrapper);
    $overviewWrapper.append($container);
    $mainWrapper.append($topWrapper).append($overviewWrapper);

    // Rebuild ke baad saved price wapas daalo
    if (savedSavingPrice) {
        jQuery('.saving-price-moible-gf').text(savedSavingPrice);
    }
}

function cleanupMobileGF() {
    var $container = jQuery('#gotrgf_form_overview_container_18');
    if (!$container.length) return;

    // Remove se pehle price save karo
    var currentPrice = jQuery('.saving-price-moible-gf').text();
    if (currentPrice) {
        savedSavingPrice = currentPrice;
    }

    var $existing = $container.closest('.gf-mobile-main-wrapper');
    if ($existing.length > 0) {
        $existing.before($container);
        $existing.remove();
    }

    jQuery('.gf-top-wrapper').remove();
    jQuery('.gf-mobile-main-wrapper').remove();
    jQuery('.gf-overview-wrapper').remove();
}

function initMobileGF() {
    if (jQuery(window).width() <= 767) {
        buildMobileGF();
    } else {
        cleanupMobileGF();
    }
}

jQuery(document).ready(function () {
    initMobileGF();
});

var gfResizeTimer;
jQuery(window).on('resize orientationchange', function () {
    clearTimeout(gfResizeTimer);
    gfResizeTimer = setTimeout(function () {
        cleanupMobileGF();
        initMobileGF();
    }, 400);
});

jQuery(document).ready(function() {
(function( $ ) {

	$.fn.numberstyle = function(options) {

		/*
		 * Default settings
		 */
		var settings = $.extend({
			value: 0,
			step: 1,
			min: 0,
			max: 999
		}, options );

		/*
		 * Init every element
		 */
		return this.each(function(i) {
				
      /*
       * Base options
       */
      var input = $(this);
          
			/*
       * Add new DOM
       */
      var container = document.createElement('div'),
          btnAdd = document.createElement('div'),
          btnRem = document.createElement('div'),
          min = (settings.min) ? settings.min : input.attr('min'),
          max = (settings.max) ? settings.max : input.attr('max'),
          value = (settings.value) ? settings.value : parseFloat(input.val());
      container.className = 'numberstyle-qty';
      btnAdd.className = (max && value >= max ) ? 'qty-btn qty-add disabled' : 'qty-btn qty-add';
      btnAdd.innerHTML = '+';
      btnRem.className = (min && value <= min) ? 'qty-btn qty-rem disabled' : 'qty-btn qty-rem';
      btnRem.innerHTML = '-';
      input.wrap(container);
      input.closest('.numberstyle-qty').prepend(btnRem).append(btnAdd);

      /*
       * Attach events
       */
      // use .off() to prevent triggering twice
      $(document).off('click','.qty-btn').on('click','.qty-btn',function(e){
        
        var input = $(this).siblings('input'),
            sibBtn = $(this).siblings('.qty-btn'),
            step = (settings.step) ? parseFloat(settings.step) : parseFloat(input.attr('step')),
            min = (settings.min) ? settings.min : ( input.attr('min') ) ? input.attr('min') : undefined,
            max = (settings.max) ? settings.max : ( input.attr('max') ) ? input.attr('max') : undefined,
            oldValue = parseFloat(input.val()),
            newVal;
        
        //Add value
        if ( $(this).hasClass('qty-add') ) {   
          
          newVal = (oldValue >= max) ? oldValue : oldValue + step,
          newVal = (newVal > max) ? max : newVal;
          
          if (newVal == max) {
            $(this).addClass('disabled');
          }
          sibBtn.removeClass('disabled');
         
        //Remove value
        } else {
          
          newVal = (oldValue <= min) ? oldValue : oldValue - step,
          newVal = (newVal < min) ? min : newVal; 
          
          if (newVal == min) {
            $(this).addClass('disabled');
          }
          sibBtn.removeClass('disabled');
          
        }
          
        //Update value
        input.val(newVal).trigger('change');
            
      });
      
      input.on('change',function(){
        
        const val = parseFloat(input.val()),
              min = (settings.min) ? settings.min : ( input.attr('min') ) ? input.attr('min') : undefined,
            	max = (settings.max) ? settings.max : ( input.attr('max') ) ? input.attr('max') : undefined;
        
        if ( val > max ) {
          input.val(max);   
        }
        
        if ( val < min ) {
          input.val(min);
        }
      });
      
		});
	};

  
  /*
   * Init
   */
  
	$('.ginput_quantity').numberstyle();

}( jQuery ));

});

<script>
jQuery(document).ready(function($) {

    // Functie die een tooltip toevoegt aan een gegeven selector met de meegegeven tooltiptekst.
    function addTooltipToField(selector, tooltipText) {
        // Maak een container met relative positionering
        var $tooltipContainer = $('<span class="tooltip-container" style="position: relative; display: inline-block;"></span>');
        
        // Maak de image aan (dezelfde image voor alle tooltips)
        var $tooltipImg = $('<img class="custom-tooltip-img" src="https://voip.nl/wp-content/uploads/2025/02/Information-Circle-Streamline-Streamline-3.0-2.svg" alt="Info" style="cursor: pointer; margin-left: 5px;">');
        
        // Maak de tooltip-div met absolute positionering ten opzichte van de container
        // Voor desktop: standaard onder de image; voor mobile wordt dit bij het tonen aangepast.
        var $tooltipDiv = $('<div class="custom-tooltip" style="display: none; position: absolute; top: 120%; left: 0; z-index: 1000; padding: 10px; max-width:300px;"></div>').text(tooltipText);
        
        // Voeg de image en tooltip toe aan de container
        $tooltipContainer.append($tooltipImg).append($tooltipDiv);
        
        // Zoek de target span en voeg daar de container aan toe
        var $targetSpan = $(selector);
        if ($targetSpan.length) {
            $targetSpan.append($tooltipContainer);
        } else {
            console.log("Target span niet gevonden voor selector: " + selector);
            return;
        }
        
        // Detecteer of dit een touch-device is
        var isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        
        // Flag om bij te houden of de tooltip via click geopend is
        var clickedOpen = false;
        
        // Hulpfuncties voor tonen en verbergen
        function showTooltip() {
            // Eerst tonen we de tooltip zodat we de breedte kunnen berekenen
            $tooltipDiv.show();
            if (isTouchDevice) {
                // Zorg dat de tooltip niet breder wordt dan 90% van de viewport
                $tooltipDiv.css('max-width', '90vw');
                // Bereken de breedte van de tooltip en de absolute positie van de container
                var tooltipWidth = $tooltipDiv.outerWidth();
                var containerOffsetLeft = $tooltipContainer.offset().left;
                var viewportLeft = $(window).scrollLeft(); // linker viewportrand
                // Standaard willen we de tooltip links van de image tonen:
                var desiredLeft = -tooltipWidth;
                // Als dit ervoor zorgt dat de tooltip buiten het scherm komt, pas dan aan:
                if (containerOffsetLeft + desiredLeft < viewportLeft) {
                    desiredLeft = viewportLeft - containerOffsetLeft;
                }
                // Plaats de tooltip verticaal gecentreerd naast de image
                $tooltipDiv.css({ left: desiredLeft, right: 'auto', top: '50%', transform: 'translateY(-50%)' });
            }
        }
        function hideTooltip() {
            $tooltipDiv.hide();
        }
        function toggleTooltip() {
            // Sluit eerst alle andere tooltips zodat er maar één tegelijk open is.
            $('.custom-tooltip').not($tooltipDiv).hide();
            // Toggle de huidige tooltip
            if ($tooltipDiv.is(":visible")) {
                hideTooltip();
                clickedOpen = false;
            } else {
                showTooltip();
                clickedOpen = true;
            }
        }
        
        // Hover events op de image (voor desktop)
        $tooltipImg.on("mouseenter", function() {
            showTooltip();
        });
        $tooltipImg.on("mouseleave", function() {
            setTimeout(function() {
                if (!$tooltipImg.is(':hover') && !$tooltipDiv.is(':hover') && !clickedOpen) {
                    hideTooltip();
                }
            }, 200);
        });
        // Hover events op de tooltip zelf
        $tooltipDiv.on("mouseenter", function() {
            showTooltip();
        });
        $tooltipDiv.on("mouseleave", function() {
            setTimeout(function() {
                if (!$tooltipImg.is(':hover') && !$tooltipDiv.is(':hover') && !clickedOpen) {
                    hideTooltip();
                }
            }, 200);
        });
        
        // Gebruik voor touch-devices of desktops de juiste event handler
        if (isTouchDevice) {
            $tooltipImg.on("touchend", function(e) {
                e.preventDefault(); // voorkom ghost clicks
                e.stopPropagation();
                toggleTooltip();
            });
        } else {
            $tooltipImg.on("click", function(e) {
                e.stopPropagation();
                toggleTooltip();
            });
        }
        
        // Klikken buiten de tooltip sluit deze
        $(document).on("click", function() {
            $tooltipDiv.hide();
            clickedOpen = false;
        });
        
        // Klikken binnen de tooltip voorkomt direct sluiten
        $tooltipDiv.on("click", function(e) {
            e.stopPropagation();
        });
    }
    
    // Tooltip voor #field_18_105 label span:first
    addTooltipToField(
        "#field_18_105 label span:first",
        "Met de gespreksopname-functie kan elke gebruiker ervoor kiezen om alle gesprekken op te nemen of per gesprek de opname wel of niet te bewaren. Ook is het mogelijk om tijdens een gesprek de opname te starten en te stopen. Via een webportal zijn alle opgenomen gesprekken van de afgelopen 90 dagen terug te vinden en desgewenst te downloaden."
    );
    
    // Tooltip voor #field_18_128 label span:first

jQuery(document).ready(function ($) {

    function updateQtyButtons() {

        let qty17 = parseInt($('#input_18_17_1').val()) || 0;
        let qty28 = parseInt($('#input_18_28_1').val()) || 0;

        let radioVal = $('input[name="input_144"]:checked').val();

        let minus17 = $('#field_18_17 .numberstyle-qty .qty-rem');
        let minus28 = $('#field_18_28 .numberstyle-qty .qty-rem');

        if (qty17 == 0 && qty28 == 0) {

            qty17 = 1;
            $('#input_18_17_1').val(1);
        }

        if (radioVal == '1') {

            minus17.show();

        } else {

            if (qty17 == 0) {

                qty17 = 1;
                $('#input_18_17_1').val(1);
            }

            if (qty17 > 1) {
                minus17.show();
            } else {
                minus17.hide();
            }
        }

        if (radioVal != '1') {

            if (qty17 > 1) {
                minus17.show();
            } else {
                minus17.hide();
            }
        }

        if (qty17 == 0) {

            if (qty28 <= 1) {
                minus28.hide();
            } else {
                minus28.show();
            }

        } else {

            minus28.show();
        }

        if (qty28 == 0) {

            if (radioVal != '1') {

                if (qty17 <= 1) {
                    minus17.hide();
                } else {
                    minus17.show();
                }

            } else {
                minus17.show();
            }
        }

    }

    $(document).on(
        'keyup change',
        '#input_18_17_1, #input_18_28_1',
        function () {

            updateQtyButtons();
        }
    );

    $(document).on(

        'input[name="input_144"]',
        function () {

            updateQtyButtons();
        }
    );
